# nginx — behind-proxy mode
# TLS terminated upstream by external proxy (NPM/Traefik/Caddy).
# External proxy must set: X-Forwarded-Proto: https

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;
events { worker_connections 2048; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on; client_max_body_size 100M; proxy_read_timeout 600s;

  upstream synapse      { server 172.42.0.3:8008; }
  upstream elementweb   { server 172.42.0.4:80; }
  upstream jitsiweb     { server 172.42.0.22:80; }
  upstream jvb_ws       { server 172.42.0.23:9090; }
  upstream prosody_http { server 172.42.0.20:5280; }

  map $http_referer $jitsi_access {
      default 0;
      "~*^https://__SERVER_NAME__" 1;
  }

  server {
    listen 80;
    server_name __SERVER_NAME__;
    location /.well-known/matrix/ {
      root /var/www/html; default_type application/json;
      add_header Access-Control-Allow-Origin "*" always;
    }
    location = /.well-known/element/jitsi {
      default_type application/json;
      add_header Access-Control-Allow-Origin "*" always;
      return 200 '{"auth":"openidtoken-jwt"}';
    }
    location /_matrix/client/v3/sync {
      proxy_pass http://synapse;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
      proxy_read_timeout 90s;
    }
    location /_matrix {
      proxy_pass http://synapse;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
    location /_synapse {
      proxy_pass http://synapse;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
    location / { proxy_pass http://elementweb; }
  }

  server {
    listen 80;
    server_name __MEET_DOMAIN__;
    add_header Content-Security-Policy "frame-ancestors 'self' https://__SERVER_NAME__" always;

    location = /.well-known/element/jitsi {
      default_type application/json;
      add_header Access-Control-Allow-Origin "*" always;
      return 200 '{"auth":"openidtoken-jwt"}';
    }
    location /colibri-ws/ {
      proxy_pass http://jvb_ws; proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 3600s;
    }
    location /http-bind {
      proxy_pass http://prosody_http/http-bind; proxy_http_version 1.1;
      proxy_set_header Host $host; proxy_set_header Connection "";
    }
    location /xmpp-websocket {
      proxy_pass http://prosody_http/xmpp-websocket; proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
    location /libs/ { proxy_pass http://jitsiweb; proxy_set_header Host $host; }
    location / {
      if ($jitsi_access = 0) { return 403; }
      proxy_pass http://jitsiweb;
    }
  }
}
