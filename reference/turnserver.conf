# Coturn — TURN/STUN relay behind nginx SNI passthrough
# Client → turns:turn.DOMAIN:443 → nginx SNI → coturn:5349 (TLS termination)
realm=__SERVER_NAME__
server-name=__TURN_DOMAIN__
use-auth-secret
static-auth-secret=__TURN_SECRET__
fingerprint
lt-cred-mech
listening-ip=0.0.0.0
relay-ip=0.0.0.0
external-ip=__EXTERNAL_IP__
# no-udp  # TLS-only TURN (required if you only forward 443)
# (comment out to allow UDP TURN on 3478)
# no-dtls # DTLS off when using TURNS-only
# (comment out to allow DTLS)
listening-port=3478
tls-listening-port=5349
min-port=49160
max-port=49250
cert=/certs/fullchain.pem
pkey=/certs/privkey.pem
no-tlsv1
no-tlsv1_1
no-cli
no-multicast-peers
no-loopback-peers
stale-nonce=600
total-quota=300
max-bps=3000000
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=224.0.0.0-239.255.255.255
denied-peer-ip=240.0.0.0-255.255.255.255
log-file=stdout
verbose
