worker_processes auto;
worker_rlimit_nofile 8192;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# SNI mux on :443 — route turn.DOMAIN to coturn, everything else to internal HTTPS
stream {
    map $ssl_preread_server_name $stream_backend {
        __TURN_DOMAIN__    coturn_tls;
        default            https_internal;
    }
    upstream coturn_tls    { server 172.42.0.15:5349; }
    upstream https_internal { server 127.0.0.1:8443; }

    server {
        listen 443;
        proxy_pass $stream_backend;
        ssl_preread on;
        proxy_timeout 3600s;
        proxy_connect_timeout 10s;
    }
}

events { worker_connections 2048; multi_accept on; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on; tcp_nopush on; tcp_nodelay on; server_tokens off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 100M;
    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;

    upstream synapse      { server 172.42.0.3:8008;  keepalive 32; }
    upstream elementweb   { server 172.42.0.4:80;    keepalive 8;  }
    upstream jitsiweb     { server 172.42.0.22:80;   keepalive 8;  }
    upstream jvb_ws       { server 172.42.0.23:9090; keepalive 16; }
    upstream prosody_http { server 172.42.0.20:5280; keepalive 4;  }

    # Map: allow Jitsi access only from Element iframe (referer check)
    map $http_referer $jitsi_access {
        default            0;
        "~*^https://__SERVER_NAME__" 1;
    }

    # Websocket upgrade map — proper upgrade/close handling
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # :80 — ACME + redirect
    server {
        listen 80;
        server_name __SERVER_NAME__ __MEET_DOMAIN__ __TURN_DOMAIN__;
        location /.well-known/acme-challenge/ { root /var/www/certbot; try_files $uri =404; }
        location /.well-known/matrix/ {
            root /var/www/html;
            default_type application/json;
            add_header Access-Control-Allow-Origin "*" always;
        }
        location / { return 301 https://$host$request_uri; }
    }

    # :8443 — DOMAIN (Matrix + Element Web)
    server {
        listen 8443 ssl http2;
        server_name __SERVER_NAME__;
        ssl_certificate     /etc/nginx/certs/live/__SERVER_NAME__/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/live/__SERVER_NAME__/privkey.pem;

        # Element service worker (requires trusted HTTPS)
        location = /sw.js {
            proxy_pass http://elementweb/sw.js;
            proxy_set_header Host $host;
            add_header Cache-Control "no-cache" always;
        }

        location /.well-known/matrix/ {
            root /var/www/html;
            default_type application/json;
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization" always;
        }
        location = /.well-known/element/jitsi {
            default_type application/json;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Cache-Control "no-cache" always;
            return 200 '{"auth":"openidtoken-jwt"}';
        }
        location /_matrix/client/v3/sync {
            proxy_pass http://synapse;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 90s;
        }
        location /_matrix {
            proxy_pass http://synapse;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
        location /_synapse {
            proxy_pass http://synapse;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
        location / {
            proxy_pass http://elementweb;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # :8443 — meet.DOMAIN (Jitsi — iframe-only access)
    server {
        listen 8443 ssl http2;
        server_name __MEET_DOMAIN__;
        ssl_certificate     /etc/nginx/certs/live/__SERVER_NAME__/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/live/__SERVER_NAME__/privkey.pem;

        add_header Content-Security-Policy "frame-ancestors 'self' https://__SERVER_NAME__" always;
        add_header X-Content-Type-Options nosniff always;

        location = /.well-known/element/jitsi {
            default_type application/json;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Cache-Control "no-cache" always;
            return 200 '{"auth":"openidtoken-jwt"}';
        }
        # JVB colibri websocket — always allowed
        location /colibri-ws/ {
            proxy_pass http://jvb_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }
        # Prosody BOSH endpoint
        location /http-bind {
            proxy_pass http://prosody_http/http-bind;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
        }
        # Prosody XMPP websocket
        location /xmpp-websocket {
            proxy_pass http://prosody_http/xmpp-websocket;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }
        # Jitsi external API JS — always allowed (Element needs it)
        location /libs/ {
            proxy_pass http://jitsiweb;
            proxy_set_header Host $host;
        }
        # Jitsi UI — 403 unless loaded from Element iframe
        location / {
            if ($jitsi_access = 0) { return 403; }
            proxy_pass http://jitsiweb;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
